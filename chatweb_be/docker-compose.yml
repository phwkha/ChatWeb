services:
  # --- MONGODB ---
  cw_mongo:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d
    networks:
      - default

  # --- POSTGRESQL ---
  cw_postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./initdb.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - default

  # --- REDIS ---
  cw_redis:
    image: redis/redis-stack:latest
    container_name: redis
    hostname: redis
    ports:
      - "6379:6379"
      - "8001:8001"
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - default

  # --- SPRING BOOT BACKEND ---
  cw_backend:
    container_name: backend
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET_ACCESS: ${JWT_SECRET_ACCESS}
      JWT_SECRET_REFRESH: ${JWT_SECRET_REFRESH}

      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@cw_mongo:27017/${MONGO_DB}?authSource=admin
      SPRING_DATASOURCE_URL: jdbc:postgresql://cw_postgres:5432/${POSTGRES_DB}

      SPRING_DATA_REDIS_HOST: cw_redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      SENDGRID_KEY: ${SENDGRID_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      TEMPLATE_OTP_ID: ${TEMPLATE_OTP_ID}

      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      SPRING_PROFILES_ACTIVE: dev
    networks:
      - default
    depends_on:
      - cw_mongo
      - cw_postgres
      - cw_redis

networks:
  default:
    name: chatweb_network

volumes:
  mongo_data:
  postgres_data:
  redis_data:
